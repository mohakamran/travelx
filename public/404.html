<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // Get the path from the URL and redirect to index.html with the path as a hash
      const path = window.location.pathname + window.location.search + window.location.hash;
      window.location.href = "/travelx/index.html" + (path.startsWith('/travelx') ? path.substring(8) : path);
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
